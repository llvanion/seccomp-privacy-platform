server {
  bind_address    = "0.0.0.0"
  bind_port       = "8081"
  trust_domain    = "example.org"
  data_dir        = "/run/spire/server/data"
  log_level       = "INFO"
  default_x509_svid_ttl = "1h"
  default_jwt_svid_ttl  = "5m"
  ca_ttl          = "168h"
  ca_subject {
    country      = ["XX"]
    organization = ["pjc-platform"]
    common_name  = "pjc-mtls-ca"
  }
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type = "sqlite3"
      connection_string = "/run/spire/server/data/datastore.sqlite3"
    }
  }
  NodeAttestor "k8s_sat" {
    plugin_data {
      clusters = {
        "pjc-cluster" = {
          service_account_allow_list = ["spire:spire-agent"]
        }
      }
    }
  }
  KeyManager "disk" {
    plugin_data {
      keys_path = "/run/spire/server/keys/keys.json"
    }
  }
  Notifier "k8sbundle" {
    plugin_data {
      namespace = "spire"
    }
  }
}

# Workload registrations are managed declaratively via spire-controller-manager.
# Two entries are required:
#
#   spiffe://example.org/pjc-server     selectors: k8s:ns:pjc-party-a, k8s:sa:pjc-server
#   spiffe://example.org/pjc-client     selectors: k8s:ns:pjc-party-b, k8s:sa:pjc-client
#
# Both are renewed every 30 minutes; SVIDs are good for 1 hour.
