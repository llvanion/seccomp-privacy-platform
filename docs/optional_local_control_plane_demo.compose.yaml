services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command:
      - start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    profiles:
      - optional-demo

  openfga:
    image: openfga/openfga:v1.8.3
    command:
      - run
    environment:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_LOG_FORMAT: text
    ports:
      - "8081:8080"
      - "3000:3000"
    profiles:
      - optional-demo

  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    command:
      - vault
      - server
      - -dev
    profiles:
      - optional-demo

# This compose file is optional local demo infrastructure only.
# It must not be treated as a required dependency for the stage-1 pipeline.
