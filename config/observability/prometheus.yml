global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alert-rules.yml"

scrape_configs:
  - job_name: "recovery-service"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:18443"]
        labels:
          tenant_id: "demo-tenant"
          service: "recovery-service"
  - job_name: "operator-dashboard"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.docker.internal:18094"]
        labels:
          service: "operator-dashboard"
