<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0f14" />
    <title>Seccomp Privacy Console</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("console.theme");
          var resolved = theme === "light" ? "light" : "dark";
          document.documentElement.classList.remove("dark", "light");
          document.documentElement.classList.add(resolved);
          var scheme = document.querySelector('meta[name="color-scheme"]');
          if (scheme) scheme.setAttribute("content", resolved);
          var themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.setAttribute("content", resolved === "light" ? "#f7fafc" : "#0a0f14");
        } catch (_) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-bg text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
